<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox AI Nexus | متحكم الذكاء الاصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; overflow: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header -->
    <header class="glass h-16 flex items-center justify-between px-8 z-10">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center font-bold">R</div>
            <h1 class="text-xl font-bold tracking-tight">Roblox <span class="gradient-text">AI NEXUS</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <div id="connection-status" class="flex items-center gap-2 text-sm text-green-400">
                <span class="w-2 h-2 bg-green-400 rounded-full pulse"></span>
                متصل بـ Roblox Studio
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar: Map Context & Scripts -->
        <aside class="w-80 glass border-r border-slate-800 p-4 flex flex-col gap-4 overflow-y-auto hidden lg:flex">
            <div>
                <h3 class="text-sm font-semibold text-slate-400 mb-3">شجرة الماب (Hierarchy)</h3>
                <div id="map-tree" class="space-y-2 text-sm text-slate-300">
                    <!-- يمتلئ تلقائياً من الفايربيس -->
                    <p class="italic opacity-50">بانتظار مزامنة الماب...</p>
                </div>
            </div>
            <hr class="border-slate-800">
            <div>
                <h3 class="text-sm font-semibold text-slate-400 mb-3">آخر الأخطاء (Debug Log)</h3>
                <div id="error-logs" class="text-xs font-mono text-red-400 bg-black/30 p-2 rounded">
                    لا توجد أخطاء حالياً.
                </div>
            </div>
        </aside>

        <!-- Chat Area -->
        <section class="flex-1 flex flex-col relative">
            <div id="chat-window" class="chat-container flex-1 overflow-y-auto p-6 space-y-6">
                <!-- الرسالة الترحيبية -->
                <div class="flex justify-start">
                    <div class="glass p-4 rounded-2xl max-w-[80%]">
                        أهلاً بك أيها المطور! أنا Claude 3.5. يمكنني رؤية الماب الخاصة بك وتعديلها الآن. ماذا سنبني اليوم؟
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-6">
                <div class="glass rounded-2xl p-2 flex flex-col shadow-2xl">
                    <div id="image-preview" class="flex gap-2 p-2 hidden">
                        <!-- معاينة الصورة المرفوعة -->
                    </div>
                    <div class="flex items-center gap-2">
                        <label class="cursor-pointer p-3 hover:bg-slate-700 rounded-xl transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            <input type="file" id="image-input" class="hidden" accept="image/*">
                        </label>
                        <input type="text" id="user-input" placeholder="مثلاً: اجعل الأرضية تنفجر عند لمسها..." 
                               class="flex-1 bg-transparent border-none focus:outline-none p-3 text-lg">
                        <button id="send-btn" class="bg-blue-600 hover:bg-blue-500 p-3 rounded-xl transition font-bold px-6">
                            إرسال
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // إعداداتك - يجب ملئها
        const FIREBASE_URL = "https://your-project.firebaseio.com/";
        const CLAUDE_API_KEY = "YOUR_CLAUDE_KEY";

        const sendBtn = document.getElementById('send-btn');
        const userInput = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');
        const imageInput = document.getElementById('image-input');
        let currentBase64Image = null;

        // 1. التعامل مع الصور
        imageInput.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                currentBase64Image = reader.result.split(',')[1];
                document.getElementById('image-preview').innerHTML = `<img src="${reader.result}" class="h-20 rounded-lg border border-blue-500">`;
                document.getElementById('image-preview').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        };

        // 2. إرسال الطلب لـ Claude
        async function askClaude() {
            const prompt = userInput.value;
            if(!prompt) return;

            appendMessage("User", prompt);
            userInput.value = "";
            
            // جلب سياق الماب من الفايربيس
            const mapData = await fetch(`${FIREBASE_URL}map_context.json`).then(r => r.json());

            const messages = [{
                role: "user",
                content: [
                    { type: "text", text: `Context from Roblox Studio (JSON): ${JSON.stringify(mapData)} \n\n User Request: ${prompt}` }
                ]
            }];

            if(currentBase64Image) {
                messages[0].content.push({
                    type: "image",
                    source: { type: "base64", media_type: "image/png", data: currentBase64Image }
                });
            }

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'x-api-key': CLAUDE_API_KEY,
                        'anthropic-version': '2023-06-01',
                        'content-type': 'application/json',
                        'dangerously-allow-browser': 'true'
                    },
                    body: JSON.stringify({
                        model: "claude-3-5-sonnet-20240620",
                        max_tokens: 2048,
                        system: "You are an expert Roblox Developer. Write ONLY Luau code that can be executed via loadstring. No explanation.",
                        messages: messages
                    })
                });

                const result = await response.json();
                const code = result.content[0].text;
                
                appendMessage("AI", "جاري إرسال الكود للـ Plugin للتنفيذ...");
                
                // إرسال الكود للفايربيس لكي يسحبه البلوقن
                await fetch(`${FIREBASE_URL}ai_output.json`, {
                    method: 'PUT',
                    body: JSON.stringify({ code: code, timestamp: Date.now() })
                });

            } catch (err) {
                appendMessage("Error", "فشل الاتصال بـ Claude API");
            }
        }

        function appendMessage(sender, text) {
            const msg = document.createElement('div');
            msg.className = `flex ${sender === 'User' ? 'justify-end' : 'justify-start'}`;
            msg.innerHTML = `<div class="glass p-4 rounded-2xl max-w-[80%] ${sender === 'User' ? 'bg-blue-900/40' : ''}">${text}</div>`;
            chatWindow.appendChild(msg);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        sendBtn.onclick = askClaude;

        // 3. تحديث شجرة الماب من الفايربيس تلقائياً
        setInterval(async () => {
            const r = await fetch(`${FIREBASE_URL}map_context.json`);
            const data = await r.json();
            if(data) {
                const tree = document.getElementById('map-tree');
                tree.innerHTML = data.slice(0, 15).map(obj => `
                    <div class="flex items-center gap-2 bg-slate-800/50 p-1 rounded">
                        <span class="text-blue-400">▣</span> ${obj.Name} <span class="text-[10px] text-slate-500">${obj.Class}</span>
                    </div>
                `).join('');
            }
        }, 5000);
    </script>
</body>
</html>
